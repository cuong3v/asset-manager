<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Tổng Gia Sản</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card2: #273548;
    --accent: #38bdf8; --green: #22c55e; --red: #ef4444;
    --yellow: #fbbf24; --text: #e2e8f0; --muted: #94a3b8; --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(135deg,#0f172a 0%,#1e293b 100%); color: var(--text); padding: 20px; min-height: 100vh; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 4px; font-size: 28px; }
  .subtitle { text-align: center; color: var(--muted); margin-bottom: 24px; font-size: 14px; }

  /* Login */
  #loginScreen { display:flex; justify-content:center; align-items:center; min-height:80vh; }
  .login-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:340px; text-align:center; }
  .login-box h2 { margin-bottom:8px; font-size:22px; }
  .login-box p { color:var(--muted); font-size:14px; margin-bottom:24px; }
  .login-box input { width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:12px 14px; border-radius:8px; font-size:15px; margin-bottom:12px; outline:none; }
  .login-box input:focus { border-color:var(--accent); }
  .login-error { color:var(--red); font-size:13px; margin-top:8px; min-height:20px; }

  /* Summary - Compact horizontal layout */
  .summary { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:stretch; }
  .summary .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; flex:1; min-width:140px; }
  .summary .card .label { color:var(--muted); font-size:12px; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .summary .card .value { font-size:18px; font-weight:700; }
  .summary .card.total { background:linear-gradient(135deg,#1e293b 0%,#273548 100%); border:1px solid var(--accent); flex:0 1 auto; min-width:200px; }
  .summary .card.total .value { color:var(--accent); font-size:22px; }

  /* Groups */
  .group { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:18px; overflow:hidden; }
  .group-header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:var(--card2); flex-wrap:wrap; gap:8px; }
  .group-header h2 { font-size:17px; display:flex; align-items:center; gap:8px; }
  .group-total { font-weight:700; color:var(--accent); font-size:16px; }
  .group-pct { color:var(--muted); font-size:13px; margin-left:8px; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:10px 14px; text-align:left; font-size:14px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  tr:last-child td { border-bottom:none; }
  input.cell-input { width:100%; background:transparent; border:1px solid transparent; color:var(--text); padding:6px 8px; border-radius:6px; font-size:14px; }
  input.cell-input:hover, input.cell-input:focus { border-color:var(--border); background:rgba(255,255,255,0.03); outline:none; }
  input.num { text-align:right; }
  .row-total { font-weight:600; color:var(--green); white-space:nowrap; }
  .btn { border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-size:13px; font-weight:600; transition:opacity .2s; }
  .btn:hover { opacity:.85; }
  .btn-add { background:var(--accent); color:#042c40; }
  .btn-del { background:transparent; color:var(--red); padding:4px 8px; font-size:16px; cursor:pointer; border:none; }
  .actions-cell { text-align:center; width:40px; }
  .add-row { padding:12px 18px; display:flex; }
  .btn-secondary { background:var(--card2); color:var(--text); border:1px solid var(--border); }
  .btn-refresh { background:var(--card2); color:var(--accent); border:1px solid var(--accent); font-size:12px; padding:6px 10px; display:flex; align-items:center; gap:6px; }
  .btn-refresh:disabled { opacity:.5; cursor:default; }
  .price-note { font-size:11px; color:var(--yellow); margin:0 18px 10px; }
  .price-time { font-size:11px; color:var(--muted); padding:0 18px 6px; }
  .spin { display:inline-block; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Center Update Button */
  .center-update { display:flex; justify-content:center; margin:24px 0; }
  .btn-update-all { background:var(--accent); color:#042c40; padding:10px 24px; font-size:14px; }

  /* Chart */
  .chart-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:18px; }
  .legend { display:flex; flex-direction:column; gap:8px; min-width:180px; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:14px; }
  .legend-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }

  /* Stat Cards for History */
  .stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
  .stat-card { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
  .stat-card .label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  .stat-card .value { font-size:18px; font-weight:700; margin-top:4px; }

  /* Sync status bar */
  #syncBar { text-align:center; font-size:12px; padding:6px 12px; border-radius:8px; margin-bottom:14px; display:none; }
  #syncBar.ok { background:rgba(34,197,94,.15); color:var(--green); display:block; }
  #syncBar.err { background:rgba(239,68,68,.15); color:var(--red); display:block; }
  #syncBar.info { background:rgba(56,189,248,.1); color:var(--accent); display:block; }

  /* History Range Buttons - Compact */
  .history-range-btns { display:flex; gap:6px; flex-wrap:wrap; padding:0 18px 12px; }
  .history-range-btns .btn-secondary { padding:6px 10px; font-size:12px; }

  /* History */
  .auto-toggle { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); margin-top:10px; justify-content:center; }
  .footer-actions { display:flex; gap:10px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
  .last-updated { text-align:center; color:var(--muted); font-size:12px; margin-top:14px; }

  /* Delete Confirmation Modal */
  .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
  .modal.show { display:flex; }
  .modal-content { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:400px; text-align:center; }
  .modal-content h3 { margin-bottom:16px; font-size:18px; }
  .modal-content p { color:var(--muted); margin-bottom:20px; }
  .modal-actions { display:flex; gap:12px; justify-content:center; }
  .modal-actions .btn { flex:1; }

  @media(max-width:600px) { 
    th,td { padding:8px 6px; font-size:13px; } 
    .summary { flex-direction:column; }
    .summary .card { min-width:100%; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:48px;margin-bottom:12px;">💰</div>
    <h2>Quản Lý Gia Sản</h2>
    <p>Nhập mật khẩu để tiếp tục</p>
    <input type="password" id="pwdInput" placeholder="Mật khẩu..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-add" style="width:100%;padding:12px;" onclick="doLogin()">Đăng nhập</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="mainApp" style="display:none;">
  <div class="container">
    <h1>Quản Lý Tổng Gia Sản</h1>
    <p class="subtitle" id="syncSubtitle">Đang kết nối...</p>

    <div id="syncBar"></div>
    <div class="summary" id="summary"></div>

    <!-- CENTER UPDATE BUTTON -->
    <div class="center-update">
      <button class="btn btn-update-all" onclick="updateAllPrices()">🔄 Cập nhật tất cả giá</button>
    </div>

    <div class="chart-wrap" id="chartWrap"></div>
    <div id="groups"></div>

    <!-- HISTORY -->
    <div class="group" id="historySection">
      <div class="group-header" style="flex-wrap:wrap; gap:10px;">
        <h2>📊 Biến động tài sản</h2>
        <select id="historySelect" class="cell-input" style="width:auto; border:1px solid var(--border);" onchange="renderHistoryChart()"></select>
      </div>
      <div id="statCardsWrap" style="padding:0 18px 12px;"></div>
      <div class="history-range-btns">
        <button class="btn btn-secondary" data-range="7" onclick="setHistoryRange('7')">7N</button>
        <button class="btn btn-secondary" data-range="30" onclick="setHistoryRange('30')">1T</button>
        <button class="btn btn-secondary" data-range="90" onclick="setHistoryRange('90')">3T</button>
        <button class="btn btn-secondary" data-range="365" onclick="setHistoryRange('365')">1N</button>
        <button class="btn btn-secondary" data-range="all" onclick="setHistoryRange('all')">Tất cả</button>
        <button class="btn btn-add" style="margin-left:auto;" onclick="manualSnapshot()">📌 Lưu mốc hôm nay</button>
      </div>
      <div id="historyChartWrap" style="padding:0 18px 18px;"></div>
    </div>

    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="exportData()">⬇️ Xuất JSON</button>
      <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">⬆️ Nhập JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>

  </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h3>Xác nhận xóa</h3>
    <p id="deleteMessage"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cancelDelete()">Hủy</button>
      <button class="btn btn-del" style="background:#ef4444;color:white;flex:1;" onclick="confirmDelete()">Xóa</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='wealth_data';const HISTORY_KEY='wealth_history';const SESSION_KEY='logged_in';const CLOUD_KEY='wealth_cloud_key';
let data={groups:[]},history=[],deleteItem=null;

// ===================== UTILS =====================
function formatNumber(n){if(!n)return '0 ₫';const s=(Math.round(n)).toString();const parts=[];for(let i=s.length;i>0;i-=3)parts.unshift(s.slice(Math.max(0,i-3),i));return parts.join('.')+' ₫';}
function formatNumberInput(input){input.addEventListener('input',()=>{let v=input.value.replace(/\D/g,'');const i=parseInt(v)||0;input.dataset.value=i;});input.addEventListener('blur',()=>{const i=parseInt(input.dataset.value)||0;input.value=formatNumber(i).replace(' ₫','');});}
function removeEmojis(s){return s.replace(/[\p{Emoji}]/gu,'').replace(/[^\x20-\x7E\u0080-\uFFFF]/g,'').trim();}

// ===================== INIT & LOAD =====================
function initApp(){
  const stored=localStorage.getItem(STORAGE_KEY);
  if(stored){data=JSON.parse(stored);migrateData();}
  else{data={groups:[{id:'cash',name:'Tiền mặt',type:'cash',items:[],priceTime:null},{id:'stocks',name:'Chứng chỉ',type:'stocks',items:[],priceTime:null},{id:'crypto',name:'Tiền điện tử',type:'crypto',items:[],priceTime:null},{id:'gold',name:'Vàng',type:'gold',items:[],priceTime:null},{id:'realestate',name:'Bất động sản',type:'realestate',items:[],priceTime:null},{id:'loans',name:'Nợ',type:'loans',items:[],priceTime:null},{id:'funds',name:'Quỹ',type:'funds',items:[],priceTime:null}];saveData();}
  const storedHistory=localStorage.getItem(HISTORY_KEY);
  if(storedHistory){try{history=JSON.parse(storedHistory);}catch(e){history=[];}}
  recordSnapshot();
  document.getElementById('syncSubtitle').innerHTML='✅ Dữ liệu đã sẵn sàng';
  render();
  renderHistorySelectOptions();
  renderHistoryChart();
  document.getElementById('autoRefresh').checked=true;
  toggleAutoRefresh();
}

function migrateData(){
  data.groups.forEach(g=>{
    g.name=removeEmojis(g.name);
    if(!g.type)g.type=g.id;
  });
  saveData();
}

function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));localStorage.setItem(HISTORY_KEY,JSON.stringify(history));}
function recordSnapshot(){const date=new Date().toISOString().slice(0,10);const total=getTotal();if(!history.find(h=>h.date===date)){const groupTotals={};data.groups.forEach(g=>{groupTotals[g.id]=getGroupTotal(g);});history.push({date,total,groups:groupTotals});history=history.slice(-365);saveData();}}

// ===================== GET VALUES =====================
function getTotal(){return data.groups.reduce((s,g)=>s+getGroupTotal(g),0);}
function getGroupTotal(g){
  if(g.type==='cash'||g.type==='loans'||g.type==='funds'){return parseInt(g.total||0)||0;}
  return g.items.reduce((s,i)=>{
    if(g.type==='crypto'){const usd=parseFloat(i.priceUsd)||0;const qty=parseFloat(i.qty)||0;return s+usd*qty*24000;}
    if(g.type==='gold'){const pricePerTael=(parseInt(i.value)||0)/10;const qty=parseInt(i.qty)||0;return s+pricePerTael*qty;}
    const price=parseFloat(i.value)||0;const qty=parseInt(i.qty)||0;return s+price*qty;
  },0);
}

// ===================== RENDER =====================
function render(){
  // Render Summary
  const total=getTotal();
  let html='';
  data.groups.forEach(g=>{
    const gt=getGroupTotal(g);
    const pct=total?((gt/total)*100).toFixed(1):'0.0';
    html+=`<div class="card"><div class="label">${escHtml(g.name)}</div><div class="value">${formatNumber(gt)}</div><div class="label">${pct}%</div></div>`;
  });
  html+=`<div class="card total"><div class="label">Tổng Tài Sản</div><div class="value">${formatNumber(total)}</div></div>`;
  document.getElementById('summary').innerHTML=html;

  // Render Groups
  html='';
  data.groups.forEach((g,gi)=>{html+=renderGroup(g,gi);});
  document.getElementById('groups').innerHTML=html;

  // Apply number formatting
  document.querySelectorAll('input.num').forEach(inp=>{formatNumberInput(inp);});
}

function renderGroup(g,gi){
  const gt=getGroupTotal(g);const total=getTotal();const pct=total?((gt/total)*100).toFixed(1):'0.0';
  let html=`<div class="group"><div class="group-header"><h2>${escHtml(g.name)}</h2><div><span class="group-total">${formatNumber(gt)}</span><span class="group-pct">${pct}%</span></div></div>`;
  
  if(g.type==='cash'||g.type==='loans'||g.type==='funds'){
    html+=`<table><tr><th>Tổng tiền</th><th style="width:80px;">Thao tác</th></tr><tr><td><input class="cell-input num" type="text" value="${formatNumber(g.total||0).replace(' ₫','')}" onchange="data.groups[${gi}].total=parseInt(this.dataset.value)||0;saveData();render();recordSnapshot();"></td><td style="text-align:center;"><button class="btn-del" onclick="showDeleteModal(${gi})">🗑</button></td></tr></table>`;
  }else if(g.type==='crypto'){
    html+=`<table><tr><th>Tên</th><th style="text-align:right;">Số lượng</th><th style="text-align:right;">Giá USD</th><th style="text-align:right;">Thành tiền USD</th><th style="text-align:right;">VNĐ</th><th style="width:40px;">Thao tác</th></tr>`;
    g.items.forEach((item,ii)=>{
      const priceUsd=parseFloat(item.priceUsd)||0;const qty=parseFloat(item.qty)||0;const usdAmount=priceUsd*qty;const vnd=usdAmount*24000;
      html+=`<tr><td><input class="cell-input" type="text" value="${escHtml(item.name)}" onchange="data.groups[${gi}].items[${ii}].name=this.value;saveData();render();"></td><td><input class="cell-input num" type="text" value="${qty}" style="text-align:right;" onchange="data.groups[${gi}].items[${ii}].qty=parseFloat(this.value)||0;saveData();render();recordSnapshot();"></td><td><input class="cell-input num" type="text" value="${priceUsd}" style="text-align:right;" onchange="data.groups[${gi}].items[${ii}].priceUsd=parseFloat(this.value)||0;saveData();render();recordSnapshot();"></td><td style="text-align:right;font-weight:600;">${formatNumber(usdAmount*24000)}</td><td style="text-align:right;color:var(--green);font-weight:600;">${formatNumber(vnd)}</td><td style="text-align:center;"><button class="btn-del" onclick="showDeleteModal(${gi},${ii})">🗑</button></td></tr>`;
    });
    html+=`</table><div class="add-row"><button class="btn btn-add" onclick="addItem(${gi})">+ Thêm</button>`;
    html+=`<button class="btn-refresh" id="refresh-${g.id}" onclick="refreshCryptoPrices(${gi})">🔄 Cập nhật</button></div>`;
  }else{
    html+=`<table><tr><th>Tên</th><th style="text-align:right;">Số lượng</th><th style="text-align:right;">Giá</th><th style="text-align:right;">Thành tiền</th><th style="width:40px;">Thao tác</th></tr>`;
    g.items.forEach((item,ii)=>{
      const price=parseFloat(item.value)||0;const qty=parseInt(item.qty)||0;const amount=g.type==='gold'?(price/10)*qty:price*qty;
      html+=`<tr><td><input class="cell-input" type="text" value="${escHtml(item.name)}" onchange="data.groups[${gi}].items[${ii}].name=this.value;saveData();render();"></td><td><input class="cell-input num" type="text" value="${qty}" style="text-align:right;" onchange="data.groups[${gi}].items[${ii}].qty=parseInt(this.value)||0;saveData();render();recordSnapshot();"></td><td><input class="cell-input num" type="text" value="${formatNumber(price).replace(' ₫','')}" style="text-align:right;" onchange="data.groups[${gi}].items[${ii}].value=parseInt(this.dataset.value)||0;saveData();render();recordSnapshot();"></td><td style="text-align:right;" class="row-total">${formatNumber(amount)}</td><td style="text-align:center;"><button class="btn-del" onclick="showDeleteModal(${gi},${ii})">🗑</button></td></tr>`;
    });
    html+=`</table><div class="add-row"><button class="btn btn-add" onclick="addItem(${gi})">+ Thêm</button>`;
    if(g.type==='gold')html+=`<button class="btn-refresh" id="refresh-${g.id}" onclick="refreshGoldPrices(${gi})">🔄 Cập nhật DOJI/SJC</button>`;
    if(g.type==='stocks')html+=`<button class="btn-refresh" id="refresh-${g.id}" onclick="refreshStockPrices(${gi})">🔄 Cập nhật</button>`;
    html+=`</div>`;
  }
  if(g.priceTime)html+=`<div class="price-time">Cập nhật: ${g.priceTime}</div>`;
  html+=`</div>`;
  return html;
}

function addItem(gi){const item={name:'Mục mới',qty:1,value:0,priceUsd:0};data.groups[gi].items.push(item);saveData();render();recordSnapshot();}

// ===================== DELETE WITH CONFIRMATION =====================
function showDeleteModal(gi,ii){
  const g=data.groups[gi];
  let msg='';
  if(ii!==undefined){const item=g.items[ii];msg=`Bạn có chắc muốn xóa "${escHtml(item.name)}" không?`;deleteItem={gi,ii};}
  else{msg=`Bạn có chắc muốn xóa nhóm "${escHtml(g.name)}" không?`;deleteItem={gi};}
  document.getElementById('deleteMessage').innerHTML=msg;
  document.getElementById('deleteModal').classList.add('show');
}
function cancelDelete(){document.getElementById('deleteModal').classList.remove('show');deleteItem=null;}
function confirmDelete(){
  if(!deleteItem)return;
  const {gi,ii}=deleteItem;
  if(ii!==undefined){data.groups[gi].items.splice(ii,1);}else{data.groups.splice(gi,1);}
  saveData();render();recordSnapshot();cancelDelete();
}

// ===================== PRICES =====================
async function updateAllPrices(){
  const btn=document.querySelector('.btn-update-all');
  const orig=btn.innerHTML;btn.innerHTML='<span class="spin">🔄</span> Đang tải...';btn.disabled=true;
  try{
    for(let i=0;i<data.groups.length;i++){
      const g=data.groups[i];
      if(g.type==='crypto')await new Promise(r=>setTimeout(()=>{refreshCryptoPrices(i);r();},500));
      else if(g.type==='gold')await new Promise(r=>setTimeout(()=>{refreshGoldPrices(i);r();},500));
      else if(g.type==='stocks')await new Promise(r=>setTimeout(()=>{refreshStockPrices(i);r();},500));
    }
  }finally{btn.innerHTML=orig;btn.disabled=false;}
}

async function refreshCryptoPrices(gi){
  const btn=document.getElementById(`refresh-crypto`);
  if(btn){const orig=btn.innerHTML;btn.innerHTML='<span class="spin">🔄</span> Đang tải...';btn.disabled=true;}
  const g=data.groups[gi];let updated=0,failed=[];
  try{
    for(const item of g.items){
      const code=item.name.toUpperCase().replace(/\s/g,'');
      try{
        const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${code}&vs_currencies=usd`,{headers:{'Accept':'application/json'}});
        if(!r.ok)throw new Error('HTTP '+r.status);
        const j=await r.json();const p=j[code]?.usd;
        if(p){item.priceUsd=p;updated++;}else failed.push(code);
      }catch(e){failed.push(code);}
    }
    g.priceTime=new Date().toLocaleString('vi-VN');
    saveData();render();recordSnapshot();
    if(!updated&&failed.length)alert(`Không lấy được giá: ${failed.join(', ')}`);
  }catch(e){alert('Lỗi crypto: '+e.message);}
  finally{if(btn){btn.innerHTML=orig;btn.disabled=false;}}
}

async function refreshStockPrices(gi){
  const btn=document.getElementById(`refresh-stocks`);
  if(btn){const orig=btn.innerHTML;btn.innerHTML='<span class="spin">🔄</span> Đang tải...';btn.disabled=true;}
  const g=data.groups[gi];let updated=0,failed=[];
  try{
    for(const item of g.items){
      const code=item.name.toUpperCase();
      try{
        const r=await fetch(`https://quote.vietstock.vn/api/QuoteService/GetQuotes?symbols=${code}&fields=basic,price,rating`,{mode:'no-cors'});
        if(!r.ok)throw new Error('HTTP '+r.status);
      }catch(e){failed.push(code);}
    }
    g.priceTime=new Date().toLocaleString('vi-VN');
    saveData();render();recordSnapshot();
  }catch(e){alert('Lỗi giá cổ phiếu: '+e.message);}
  finally{if(btn){btn.innerHTML=orig;btn.disabled=false;}}
}

async function refreshGoldPrices(gi){
  const btn=document.getElementById(`refresh-gold`);
  if(btn){const orig=btn.innerHTML;btn.innerHTML='<span class="spin">🔄</span> Đang tải...';btn.disabled=true;}
  const g=data.groups[gi];
  const sources=[
    async()=>{
      const r=await fetch('https://giavang.doji.vn/api/v3/gold-price/group/g-tphcm');
      if(!r.ok)throw new Error('DOJI HTTP '+r.status);
      const j=await r.json();const list=j?.data?.data||j?.data||j;
      if(!Array.isArray(list))throw new Error('DOJI: dữ liệu không hợp lệ');
      const ring=list.find(it=>{const n=(it.Name||it.name||'').toUpperCase();return n.includes('NHẪN')||n.includes('NHAN')||n.includes('9999');});
      if(!ring)throw new Error('DOJI: không tìm thấy vàng nhẫn 9999');
      const buy=ring.Buy??ring.buy??ring.BuyPrice;if(!buy)throw new Error('DOJI: không có giá mua');
      return buy<1000000?Math.round(buy*1000):Math.round(buy);
    },
    async()=>{
      const r=await fetch('https://sjc.com.vn/GoldPrice/Services/PriceService.ashx');
      if(!r.ok)throw new Error('SJC HTTP '+r.status);
      const j=await r.json();const list=j?.data||j;
      if(!Array.isArray(list))throw new Error('SJC: dữ liệu không hợp lệ');
      const ring=list.find(it=>{const n=(it.TypeName||it.Name||it.name||'').toUpperCase();return n.includes('NHẪN')||n.includes('NHAN');});
      if(!ring)throw new Error('SJC: không tìm thấy vàng nhẫn');
      const buy=ring.BuyValue??ring.Buy??ring.buy;if(!buy)throw new Error('SJC: không có giá mua');
      return buy<1000000?Math.round(buy*1000):Math.round(buy);
    }
  ];
  let price=null,errors=[];
  for(const src of sources){try{price=await src();if(price)break;}catch(e){errors.push(e.message);}}
  try{
    if(!price)throw new Error(errors.join(' | '));
    let updated=0;
    g.items.forEach(i=>{const n=i.name.toUpperCase();if(n.includes('NHẪN')||n.includes('NHAN')||n.includes('9999')){i.value=price;updated++;}});
    g.priceTime=new Date().toLocaleString('vi-VN');
    saveData();render();recordSnapshot();
    if(!updated)alert('Không có tài sản nào tên chứa "Vàng nhẫn"/"9999" để cập nhật.');
  }catch(e){alert('Không lấy được giá vàng: '+e.message);}
  finally{if(btn){btn.innerHTML=orig;btn.disabled=false;}}
}

let autoRefreshTimer=null;
function toggleAutoRefresh(){
  const checked=document.getElementById('autoRefresh')?.checked;
  if(checked){
    const ci=data.groups.findIndex(g=>g.id==='crypto');
    if(ci>=0)refreshCryptoPrices(ci);
    autoRefreshTimer=setInterval(()=>{const i=data.groups.findIndex(g=>g.id==='crypto');if(i>=0)refreshCryptoPrices(i);},30000);

// ===================== HISTORY CHART =====================
let historyRange='all';
function setHistoryRange(r){historyRange=r;renderHistoryChart();}
function manualSnapshot(){recordSnapshot();localStorage.setItem(STORAGE_KEY,JSON.stringify(data));renderHistoryChart();alert('Đã lưu mốc tài sản cho hôm nay.');}

function renderHistorySelectOptions(){
  const sel=document.getElementById('historySelect');
  const prev=sel.value||'total';
  let html=`<option value="total">Tổng tài sản (tổng quát)</option>`;
  data.groups.forEach(g=>{html+=`<option value="${g.id}">${escHtml(g.name)}</option>`;});
  sel.innerHTML=html;
  if([...sel.options].some(o=>o.value===prev))sel.value=prev;
}

function renderHistoryChart(){
  document.querySelectorAll('#historySection [data-range]').forEach(btn=>{
    btn.style.borderColor=btn.dataset.range===historyRange?'var(--accent)':'var(--border)';
    btn.style.color=btn.dataset.range===historyRange?'var(--accent)':'var(--text)';
  });
  const wrap=document.getElementById('historyChartWrap');
  const statWrap=document.getElementById('statCardsWrap');
  let history=data.history.slice();
  if(!history.length){wrap.innerHTML=`<div style="color:var(--muted);text-align:center;padding:20px 0;">Chưa có dữ liệu lịch sử.</div>`;statWrap.innerHTML='';return;}
  if(historyRange!=='all'){
    const days=parseInt(historyRange,10);
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    const cs=cutoff.toISOString().slice(0,10);
    const f=history.filter(h=>h.date>=cs);
    history=f.length>=2?f:history.slice(-Math.max(2,f.length||2));
  }
  const sel=document.getElementById('historySelect').value||'total';
  const values=history.map(h=>sel==='total'?h.total:(h.groups[sel]||0));
  const dates=history.map(h=>h.date);
  if(history.length===1){
    wrap.innerHTML=`<div style="color:var(--muted);text-align:center;padding:20px 0;">Chỉ có 1 mốc dữ liệu: <strong style="color:var(--accent)">${formatNumber(values[0])}</strong></div>`;statWrap.innerHTML='';return;
  }
  const diff=values[values.length-1]-values[0];
  const pct=values[0]?diff/values[0]*100:0;
  const minV=Math.min(...values);
  const maxV=Math.max(...values);
  const avgV=values.reduce((a,b)=>a+b,0)/values.length;
  
  // Stat Cards
  const cc=diff>=0?'var(--green)':'var(--red)';
  const cs2=diff>=0?'+':'';
  statWrap.innerHTML=`
    <div class="stat-cards">
      <div class="stat-card"><div class="label">Thấp nhất</div><div class="value" style="color:var(--red);">${formatNumber(minV)}</div></div>
      <div class="stat-card"><div class="label">Cao nhất</div><div class="value" style="color:var(--green);">${formatNumber(maxV)}</div></div>
      <div class="stat-card"><div class="label">Thay đổi</div><div class="value" style="color:${cc};">${cs2}${formatNumber(diff)} (${cs2}${pct.toFixed(1)}%)</div></div>
    </div>
  `;

  // Chart
  const W=700,H=260,pL=60,pR=20,pT=20,pB=36;
  const range=(maxV-minV)||1;
  const plotW=W-pL-pR,plotH=H-pT-pB;
  const pts=values.map((v,i)=>({x:pL+(i/(values.length-1))*plotW,y:pT+plotH-((v-minV)/range)*plotH,v,date:dates[i]}));
  const lineColor=diff>=0?'var(--green)':'var(--red)';
  const line=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const area=line+` L${pts[pts.length-1].x.toFixed(1)},${pT+plotH} L${pts[0].x.toFixed(1)},${pT+plotH} Z`;
  let grid='';
  for(let i=0;i<=4;i++){const y=pT+(plotH/4)*i,val=maxV-(range/4)*i;grid+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="var(--border)" stroke-width="1"/><text x="${pL-8}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--muted)">${fmtCompact(val)}</text>`;}
  const li2=[0,Math.floor((pts.length-1)/2),pts.length-1];
  let xl='';li2.forEach(i=>{xl+=`<text x="${pts[i].x.toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted)">${fmtDate(pts[i].date)}</text>`;});
  let dots='';pts.forEach(p=>{dots+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${lineColor}"><title>${fmtDate(p.date)}: ${formatNumber(p.v)}</title></circle>`;});
  wrap.innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;">
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lineColor}" stop-opacity="0.25"/><stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/></linearGradient></defs>
      ${grid}<path d="${area}" fill="url(#ag)"/><path d="${line}" fill="none" stroke="${lineColor}" stroke-width="2.5"/>${dots}${xl}
    </svg>`;
}

function fmtDate(d){const[y,m,dd]=d.split('-');return`${dd}/${m}/${y.slice(2)}`;}
function fmtCompact(n){const a=Math.abs(n);if(a>=1e9)return(n/1e9).toFixed(1)+'B';if(a>=1e6)return(n/1e6).toFixed(1)+'M';if(a>=1e3)return(n/1e3).toFixed(0)+'K';return n.toFixed(0);}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ===================== IMPORT/EXPORT =====================
function exportData(){const a=document.createElement('a');a.href='data:text/json;base64,'+btoa(JSON.stringify(data));a.download='wealth-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const j=JSON.parse(r.result);if(j.groups){data=j;saveData();render();renderHistorySelectOptions();renderHistoryChart();alert('Nhập dữ liệu thành công!');}else alert('File không hợp lệ.');}catch(x){alert('Lỗi: '+x.message);}};r.readAsText(f);}
